services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: pos-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pos_db
      SPRING_DATASOURCE_USERNAME: pos_user
      SPRING_DATASOURCE_PASSWORD: pos_password
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      CHAPA_SECRET_KEY: ${CHAPA_SECRET_KEY:-CHASECK_TEST-Zk7KciLfAHNcnEWyjRnC9NysQrE3YtHF}
      CHAPA_CALLBACK_URL: ${CHAPA_CALLBACK_URL:-http://localhost:8080/api/sales/chapa/callback}
      CHAPA_RETURN_URL: ${CHAPA_RETURN_URL:-http://localhost:8080/api/sales/chapa/return}
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
